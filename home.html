<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXORA News</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
scroll-behavior:smooth;
}

body{
background:#0d1117;
color:white;
overflow-x:hidden;
}

/* SCROLL */

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-track{
background:#0d1117;
}

::-webkit-scrollbar-thumb{
background:linear-gradient(#00bfff,#7a00ff);
border-radius:20px;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:1000;
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
background:rgba(10,15,25,0.9);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:32px;
font-weight:bold;
background:linear-gradient(90deg,#00bfff,#7a00ff,#ff00cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search-box{
display:flex;
align-items:center;
gap:10px;
}

.search-box input{
width:280px;
padding:13px 16px;
border:none;
outline:none;
border-radius:14px;
background:#161b22;
color:white;
}

.header-icons{
display:flex;
gap:12px;
}

.icon{
width:45px;
height:45px;
border-radius:14px;
background:#161b22;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
transition:0.2s;
}

.icon:hover{
transform:scale(1.08);
background:#1f2630;
}

/* HERO */

.hero{
padding:30px;
}

.hero-card{
position:relative;
height:420px;
border-radius:30px;
overflow:hidden;
background:url('https://picsum.photos/1400/800?news') center/cover;
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,0.85),rgba(0,0,0,0.15));
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:35px;
}

.tag{
width:max-content;
padding:8px 15px;
border-radius:30px;
background:#00bfff;
font-size:13px;
margin-bottom:15px;
}

.hero-overlay h1{
font-size:42px;
max-width:700px;
line-height:1.4;
margin-bottom:15px;
}

.hero-overlay p{
max-width:650px;
color:#ddd;
line-height:1.8;
}

/* NEWS */

.section{
padding:0 30px 30px;
}

.section-title{
font-size:26px;
margin-bottom:20px;
}

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:22px;
}

.news-card{
background:#161b22;
border-radius:24px;
overflow:hidden;
transition:0.25s;
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
position:relative;
animation:fadeUp .4s ease;
}

.news-card:hover{
transform:translateY(-6px);
box-shadow:0 0 25px rgba(0,191,255,0.15);
}

.news-card img,
.news-card video{
width:100%;
height:220px;
object-fit:cover;
background:black;
}

.news-content{
padding:18px;
}

.news-content h3{
margin-bottom:10px;
line-height:1.5;
word-break:break-word;
}

.news-content p{
color:#aaa;
font-size:14px;
line-height:1.8;
margin-bottom:15px;
word-break:break-word;
}

.news-footer{
display:flex;
justify-content:space-between;
font-size:13px;
color:#777;
gap:10px;
flex-wrap:wrap;
}

/* LOADER */

.loader{
width:100%;
padding:40px;
text-align:center;
color:#aaa;
}

/* ADMIN */

.admin-actions{
position:absolute;
top:10px;
left:10px;
display:none;
gap:8px;
z-index:5;
}

.admin-mode .admin-actions{
display:flex;
}

.edit-btn,
.delete-btn{
border:none;
padding:8px 10px;
border-radius:10px;
cursor:pointer;
color:white;
font-size:12px;
}

.edit-btn{
background:#007bff;
}

.delete-btn{
background:#ff004c;
}

/* INFO */

.info-section{
padding:0 30px 40px;
}

.info-boxes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.info-box{
background:#161b22;
padding:25px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.05);
transition:.3s;
}

.info-box:hover{
transform:translateY(-5px);
border-color:#00bfff;
}

.info-box h2{
font-size:32px;
margin-bottom:8px;
color:#00bfff;
}

.info-box p{
color:#aaa;
}

/* FOOTER */

.footer{
padding:25px;
text-align:center;
color:#777;
border-top:1px solid rgba(255,255,255,0.05);
background:#0b0f15;
}

/* ADMIN BUTTON */

#adminBtn{
position:fixed;
bottom:25px;
left:25px;
width:70px;
height:70px;
border:none;
border-radius:50%;
background:linear-gradient(135deg,#00bfff,#7a00ff);
color:white;
font-size:32px;
cursor:pointer;
z-index:9999;
box-shadow:0 0 25px rgba(0,191,255,0.4);
display:none;
}

/* PANEL */

#adminPanel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:430px;
background:#161b22;
padding:25px;
border-radius:24px;
display:none;
flex-direction:column;
gap:15px;
z-index:99999;
max-height:90vh;
overflow:auto;
border:1px solid rgba(255,255,255,0.08);
}

#adminPanel input,
#adminPanel textarea,
#adminPanel select{
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:#0d1117;
color:white;
}

#adminPanel textarea{
height:130px;
resize:none;
}

#adminPanel button{
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#00bfff,#7a00ff);
color:white;
font-size:16px;
cursor:pointer;
}

/* MODAL */

#articleModal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
z-index:999999;
display:none;
overflow:auto;
padding:40px;
}

.modal-content{
max-width:950px;
margin:auto;
background:#111827;
border-radius:30px;
overflow:hidden;
animation:fadeUp .3s ease;
}

.modal-media img,
.modal-media video{
width:100%;
max-height:500px;
object-fit:cover;
background:black;
}

.modal-body{
padding:30px;
}

.modal-body h1{
font-size:38px;
margin-bottom:20px;
word-break:break-word;
}

.modal-body p{
line-height:2;
color:#ddd;
font-size:18px;
white-space:pre-line;
word-break:break-word;
}

.close-modal{
position:fixed;
top:25px;
left:25px;
width:60px;
height:60px;
border:none;
border-radius:50%;
background:#161b22;
color:white;
font-size:26px;
cursor:pointer;
}

/* ANIMATION */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:900px){

.search-box{
display:none;
}

.hero-card{
height:340px;
}

.hero-overlay h1{
font-size:28px;
}

.hero{
padding:15px;
}

.section,
.info-section{
padding:0 15px 25px;
}

.header{
padding:0 15px;
}

.logo{
font-size:24px;
}

#adminPanel{
width:92%;
}

.modal-body h1{
font-size:28px;
}

.modal-body p{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">NEXORA</div>

<div class="search-box">
<input type="text" placeholder="ابحث..." id="searchInput">
</div>

<div class="header-icons">
<div class="icon">🔔</div>
<div class="icon">⚙️</div>
<div class="icon">👤</div>
</div>

</div>

<div class="hero">

<div class="hero-card">

<div class="hero-overlay">

<div class="tag">خبر عاجل</div>

<h1>
إطلاق منصة NEXORA الجديدة
</h1>

<p>
منصة احترافية لنشر الأخبار والمقالات والمحتوى الحديث.
</p>

</div>

</div>

</div>

<div class="section">

<h2 class="section-title">
آخر الأخبار
</h2>

<div class="news-grid" id="newsContainer">

<div class="loader">
جاري تحميل الأخبار...
</div>

</div>

</div>

<div class="info-section">

<h2 class="section-title">
إحصائيات المنصة
</h2>

<div class="info-boxes">

<div class="info-box">
<h2>120K+</h2>
<p>عدد المستخدمين</p>
</div>

<div class="info-box">
<h2>15K+</h2>
<p>خبر منشور</p>
</div>

<div class="info-box">
<h2>320+</h2>
<p>كاتب ومحرر</p>
</div>

<div class="info-box">
<h2>24/7</h2>
<p>تغطية مستمرة</p>
</div>

</div>

</div>

<div class="footer">
© 2026 NEXORA
</div>

<button id="adminBtn">➕</button>

<div id="adminPanel">

<h2 id="panelTitle">
نشر مقال جديد
</h2>

<input type="text" id="newsTitle" placeholder="عنوان الخبر">

<input type="text" id="newsCategory" placeholder="التصنيف">

<select id="mediaType">
<option value="image">صورة</option>
<option value="video">فيديو</option>
</select>

<input type="file" id="mediaFile" accept="image/*,video/*">

<textarea id="newsDesc" placeholder="وصف الخبر"></textarea>

<button id="publishBtn">
نشر الخبر
</button>

</div>

<div id="articleModal">

<button class="close-modal" onclick="closeModal()">
✕
</button>

<div class="modal-content">

<div class="modal-media" id="modalMedia"></div>

<div class="modal-body">

<div class="tag" id="modalCategory"></div>

<h1 id="modalTitle"></h1>

<p id="modalDesc"></p>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyDLSOZogDC_f23jnybhYpH_MNVCnVHeU50",

authDomain: "nexora-cdf18.firebaseapp.com",

projectId: "nexora-cdf18",

storageBucket: "nexora-cdf18.appspot.com",

messagingSenderId: "610110841134",

appId: "1:610110841134:web:86985a639f4f5139315abf"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

/* ADMIN EMAIL */

const ADMIN_EMAIL = "wa037081@gmail.com";

/* VARIABLES */

let isAdmin = false;

let editingId = null;

/* ELEMENTS */

const adminBtn =
document.getElementById("adminBtn");

const panel =
document.getElementById("adminPanel");

const publishBtn =
document.getElementById("publishBtn");

/* LOGIN BUTTON */

const loginBtn = document.createElement("button");

loginBtn.innerText = "تسجيل الدخول";

loginBtn.style.position = "fixed";
loginBtn.style.bottom = "25px";
loginBtn.style.right = "25px";
loginBtn.style.padding = "14px 22px";
loginBtn.style.border = "none";
loginBtn.style.borderRadius = "18px";
loginBtn.style.background =
"linear-gradient(135deg,#00bfff,#7a00ff)";
loginBtn.style.color = "white";
loginBtn.style.fontSize = "15px";
loginBtn.style.cursor = "pointer";
loginBtn.style.zIndex = "99999";

document.body.appendChild(loginBtn);

/* LOGOUT BUTTON */

const logoutBtn = document.createElement("button");

logoutBtn.innerText = "تسجيل الخروج";

logoutBtn.style.position = "fixed";
logoutBtn.style.top = "90px";
logoutBtn.style.left = "20px";
logoutBtn.style.padding = "12px 18px";
logoutBtn.style.border = "none";
logoutBtn.style.borderRadius = "14px";
logoutBtn.style.background = "#ff004c";
logoutBtn.style.color = "white";
logoutBtn.style.cursor = "pointer";
logoutBtn.style.display = "none";
logoutBtn.style.zIndex = "999999";

document.body.appendChild(logoutBtn);

/* SAFE HTML */

function escapeHTML(text){

const div = document.createElement("div");

div.innerText = text || "";

return div.innerHTML;

}

/* LOGIN */

loginBtn.onclick = async () => {

try{

const result =
await signInWithPopup(auth,provider);

const user = result.user;

if(user.email === ADMIN_EMAIL){

isAdmin = true;

adminBtn.style.display = "block";

logoutBtn.style.display = "block";

document.body.classList.add("admin-mode");

alert("تم تسجيل الدخول كمسؤول");

}else{

alert("تم تسجيل الدخول");

}

}catch(error){

alert(error.message);

}

};

/* CHECK LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

loginBtn.innerText =
user.displayName || "تم الدخول";

if(user.photoURL){

loginBtn.style.backgroundImage =
`url(${user.photoURL})`;

loginBtn.style.backgroundSize = "cover";

loginBtn.style.backgroundPosition = "center";

loginBtn.style.color = "transparent";

}

if(user.email === ADMIN_EMAIL){

isAdmin = true;

adminBtn.style.display = "block";

logoutBtn.style.display = "block";

document.body.classList.add("admin-mode");

}

}else{

isAdmin = false;

adminBtn.style.display = "none";

logoutBtn.style.display = "none";

document.body.classList.remove("admin-mode");

loginBtn.innerText = "تسجيل الدخول";

loginBtn.style.backgroundImage = "none";

loginBtn.style.background =
"linear-gradient(135deg,#00bfff,#7a00ff)";

loginBtn.style.color = "white";

}

});

/* LOGOUT */

logoutBtn.onclick = async () => {

try{

await signOut(auth);

alert("تم تسجيل الخروج");

}catch(error){

alert(error.message);

}

};

/* ADMIN PANEL */

adminBtn.onclick = () => {

if(!isAdmin){

alert("غير مصرح");

return;

}

panel.style.display =
panel.style.display === "flex"
? "none"
: "flex";

};

/* CLEAR FORM */

function clearForm(){

document.getElementById("newsTitle").value = "";

document.getElementById("newsCategory").value = "";

document.getElementById("newsDesc").value = "";

document.getElementById("mediaFile").value = "";

editingId = null;

publishBtn.innerText = "نشر الخبر";

document.getElementById("panelTitle").innerText =
"نشر مقال جديد";

}

/* VALIDATE FILE */

function validateFile(file){

if(!file) return false;

const maxSize = 20 * 1024 * 1024;

if(file.size > maxSize){

alert("حجم الملف كبير جدا");

return false;
}

return true;

}

/* FILE TO BASE64 */

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader = new FileReader();

reader.readAsDataURL(file);

reader.onload = () => resolve(reader.result);

reader.onerror = error => reject(error);

});

}

/* PUBLISH */

publishBtn.onclick = async function(){

if(!isAdmin){

alert("غير مصرح");

return;

}

const title =
document.getElementById("newsTitle").value.trim();

const category =
document.getElementById("newsCategory").value.trim();

const desc =
document.getElementById("newsDesc").value.trim();

const mediaType =
document.getElementById("mediaType").value;

const file =
document.getElementById("mediaFile").files[0];

if(!title || !category || !desc){

alert("املأ جميع الحقول");

return;

}

if(file && !validateFile(file)){
return;
}

try{

publishBtn.disabled = true;

publishBtn.innerText = "جاري النشر...";

let mediaUrl = "";

if(file){

mediaUrl = await fileToBase64(file);

}

if(editingId){

const updateData = {
title,
category,
desc
};

if(mediaUrl !== ""){

updateData.mediaUrl = mediaUrl;

updateData.mediaType = mediaType;

}

await updateDoc(
doc(db,"news",editingId),
updateData
);

alert("تم تعديل الخبر");

}else{

if(!file){

alert("اختر صورة أو فيديو");

publishBtn.disabled = false;

publishBtn.innerText = "نشر الخبر";

return;

}

await addDoc(collection(db,"news"),{

title,
category,
desc,
mediaUrl,
mediaType,
time:Date.now()

});

alert("تم نشر الخبر");

}

clearForm();

panel.style.display = "none";

loadNews();

}catch(error){

alert(error.message);

}finally{

publishBtn.disabled = false;

publishBtn.innerText =
editingId ? "حفظ التعديلات" : "نشر الخبر";

}

};

/* LOAD NEWS */

async function loadNews(){

const container =
document.getElementById("newsContainer");

container.innerHTML = `
<div class="loader">
جاري تحميل الأخبار...
</div>
`;

try{

const q = query(
collection(db,"news"),
orderBy("time","desc")
);

const querySnapshot =
await getDocs(q);

container.innerHTML = "";

if(querySnapshot.empty){

container.innerHTML = `
<div class="loader">
لا توجد أخبار حاليا
</div>
`;

return;
}

querySnapshot.forEach((documentData)=>{

const data = documentData.data();

const id = documentData.id;

let mediaHTML = "";

if(data.mediaType === "video"){

mediaHTML = `
<video muted controls>
<source src="${data.mediaUrl}">
</video>
`;

}else{

mediaHTML = `
<img
loading="lazy"
src="${data.mediaUrl}"
alt="news image"
>
`;

}

container.innerHTML += `

<div class="news-card">

<div class="admin-actions">

<button
class="edit-btn"
onclick="event.stopPropagation(); editNews(
'${id}',
${JSON.stringify(data.title)},
${JSON.stringify(data.category)},
${JSON.stringify(data.desc)}
)"
>
تعديل
</button>

<button
class="delete-btn"
onclick="event.stopPropagation(); deleteNews('${id}')"
>
حذف
</button>

</div>

<div onclick='openArticle(
${JSON.stringify(data.title)},
${JSON.stringify(data.desc)},
${JSON.stringify(data.category)},
${JSON.stringify(data.mediaUrl)},
${JSON.stringify(data.mediaType)}
)'>

${mediaHTML}

<div class="news-content">

<h3>${escapeHTML(data.title)}</h3>

<p>
${escapeHTML((data.desc || "").substring(0,120))}...
</p>

<div class="news-footer">

<span>
${new Date(data.time).toLocaleDateString("ar")}
</span>

<span>
${escapeHTML(data.category)}
</span>

</div>

</div>

</div>

</div>

`;

});

}catch(error){

console.error(error);

container.innerHTML = `
<div class="loader" style="color:red;">
فشل تحميل الأخبار
</div>
`;

}

}

loadNews();

/* DELETE */

window.deleteNews = async function(id){

if(!isAdmin){

alert("غير مصرح");

return;

}

const confirmDelete =
confirm("هل تريد حذف الخبر؟");

if(!confirmDelete) return;

try{

await deleteDoc(doc(db,"news",id));

loadNews();

}catch(error){

alert(error.message);

}

};

/* EDIT */

window.editNews = function(
id,
title,
category,
desc
){

if(!isAdmin){

alert("غير مصرح");

return;

}

editingId = id;

document.getElementById("newsTitle").value = title;

document.getElementById("newsCategory").value = category;

document.getElementById("newsDesc").value = desc;

document.getElementById("panelTitle").innerText =
"تعديل الخبر";

publishBtn.innerText = "حفظ التعديلات";

panel.style.display = "flex";

};

/* ARTICLE MODAL */

window.openArticle = function(
title,
desc,
category,
mediaUrl,
mediaType
){

document.body.style.overflow = "hidden";

document
.getElementById("articleModal")
.style.display = "block";

document
.getElementById("modalTitle")
.innerText = title;

document
.getElementById("modalDesc")
.innerText = desc;

document
.getElementById("modalCategory")
.innerText = category;

if(mediaType === "video"){

document
.getElementById("modalMedia")
.innerHTML = `
<video controls autoplay>
<source src="${mediaUrl}">
</video>
`;

}else{

document
.getElementById("modalMedia")
.innerHTML = `
<img src="${mediaUrl}" alt="news">
`;

}

};

/* CLOSE */

window.closeModal = function(){

document.body.style.overflow = "auto";

document
.getElementById("articleModal")
.style.display = "none";

};

/* CLOSE WHEN CLICK OUTSIDE */

document
.getElementById("articleModal")
.addEventListener("click",function(e){

if(e.target.id === "articleModal"){
closeModal();
}

});

/* SEARCH */

document
.getElementById("searchInput")
.addEventListener("input",function(){

const value =
this.value.toLowerCase();

const cards =
document.querySelectorAll(".news-card");

cards.forEach((card)=>{

const text =
card.innerText.toLowerCase();

card.style.display =
text.includes(value)
? "block"
: "none";

});

});

</script>
</body>
</html>
