<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password - NEXORA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0a0a12,
#12091f,
#000
);
overflow:hidden;
}

.reset-container{

width:420px;

padding:35px;

border-radius:25px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 50px rgba(0,0,0,0.5);

}

.logo{

text-align:center;

font-size:42px;

font-weight:bold;

margin-bottom:15px;

background:
linear-gradient(
135deg,
#ff00cc,
#7a00ff,
#0095ff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.desc{

text-align:center;

color:#aaa;

line-height:1.7;

margin-bottom:25px;

font-size:14px;

}

input{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:#171724;

border:1px solid #2d2d44;

color:white;

font-size:15px;

outline:none;

margin-bottom:15px;

}

input:focus{

border-color:#7a00ff;

box-shadow:
0 0 15px rgba(122,0,255,0.3);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
#ff008c,
#7a00ff
);

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);

}

.back{

display:block;

text-align:center;

margin-top:18px;

color:#aaa;

text-decoration:none;

font-size:14px;

}

.back:hover{

color:white;

}

</style>

</head>

<body>

<div class="reset-container">

<div class="logo">
NEXORA
</div>

<p class="desc">

أدخل بريدك الإلكتروني لإرسال رابط إعادة تعيين كلمة المرور

</p>

<input
id="resetEmail"
type="email"
placeholder="البريد الإلكتروني"
>

<button onclick="resetPassword()">

إرسال رابط إعادة التعيين

</button>

<a
href="index.html"
class="back"
>

العودة إلى تسجيل الدخول

</a>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

getAuth,

sendPasswordResetEmail

}

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyDLSOZogDC_f23jnybhYpH_MNVCnVHeU50",

authDomain: "nexora-cdf18.firebaseapp.com",

projectId: "nexora-cdf18",

storageBucket: "nexora-cdf18.firebasestorage.app",

messagingSenderId: "610110841134",

appId: "1:610110841134:web:86985a639f4f5139315abf",

measurementId: "G-1T21KW9STE",

databaseURL: "https://nexora-cdf18-default-rtdb.firebaseio.com"

};
/* INIT */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* RESET */

window.resetPassword = function(){

const email =
document.getElementById("resetEmail").value;

if(email === ""){

alert("أدخل البريد الإلكتروني");

return;

}

sendPasswordResetEmail(auth,email)

.then(()=>{

alert("تم إرسال رابط إعادة تعيين كلمة المرور");

})

.catch((error)=>{

alert(error.message);

});

};

</script>

</body>
</html>
